# Brightdate fork: matrix trimmed to distros that ship libsecp256k1-dev
# and openssl-dev. The lanes we removed (ubuntu:bionic, debian:oldstable,
# rockylinux:8) couldn't satisfy libBrightLink's build deps; they pre-date
# the BrightLink integration.

name: "CI: docker based builds"
on: [push, pull_request]

jobs:
  job:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          # 32bit build — Debian stable has libsecp256k1:i386 and libssl-dev:i386.
          - container: "debian:stable"
            env:
              CC: gcc
              VARIANT: i386
              BUILD_32: 1

          # cross compilation builds — Debian testing carries libsecp256k1-dev
          # for these target architectures via debian-ports / multi-arch.
          - container: "debian:testing"
            env:
              ARCH: arm64
              CC: aarch64-linux-gnu-gcc
              VARIANT: cross-compile

          - container: "debian:testing"
            env:
              ARCH: ppc64el
              CC: powerpc64le-linux-gnu-gcc
              VARIANT: cross-compile

          - container: "debian:testing"
            env:
              ARCH: s390x
              CC: s390x-linux-gnu-gcc
              VARIANT: cross-compile

          # musl (native) — Alpine ships secp256k1-dev in its main repo.
          - container: "alpine:latest"
            env:
              CC: gcc
              EXTRA_BUILD_OPTS: "-DBUILD_HTML_MANS=false -DBUILD_MANS=false"

          # some non-default options — drops bsh-iputils features that
          # aren't BrightLink-relevant; libsecp256k1 is still required.
          - container: "debian:stable"
            env:
              CC: gcc
              EXTRA_BUILD_OPTS: "-DUSE_CAP=false -DUSE_IDN=false -DBUILD_ARPING=false -DBUILD_CLOCKDIFF=false -DUSE_GETTEXT=false"

          # other builds
          - container: "opensuse/tumbleweed"
            env:
              CC: gcc

          - container: "ubuntu:jammy"
            env:
              CC: gcc

          - container: "ubuntu:noble"
            env:
              CC: gcc

          - container: "fedora:latest"
            env:
              CC: clang

          # CentOS Stream 9 and RockyLinux 9 are dropped from the matrix
          # because EPEL 9 doesn't ship libsecp256k1-devel and we don't
          # currently bundle a source build path for the rpm world. The
          # tooling and the protocol stack are RHEL-compatible; we just
          # need a downstream package or an extra repo. When that lands,
          # uncomment these lines.
          # - container: "quay.io/centos/centos:stream9"
          #   env:
          #     CC: gcc
          #
          # - container: "rockylinux:9"
          #   env:
          #     CC: gcc

          - container: "debian:testing"
            env:
              CC: gcc
              EXTRA_BUILD_OPTS: "-DNO_SETCAP_OR_SUID=false"

          - container: "debian:stable"
            env:
              CC: gcc

    container:
      image: ${{ matrix.container }}
      env: ${{ matrix.env }}
      options: --security-opt seccomp=unconfined

    steps:
    - name: Show OS
      run: cat /etc/os-release

    # The container images don't ship git pre-installed, but
    # actions/checkout@v4 needs git >= 2.18 in PATH to handle the
    # submodules: recursive option. So we install git first via the
    # smallest possible package, then check out without recursion, then
    # let the per-distro dep script install the rest, and finally pull
    # the submodule by hand from the populated container.
    - name: Install git for actions/checkout
      run: |
        if   command -v apt-get  >/dev/null 2>&1; then
            apt-get update && apt-get install -y --no-install-recommends git ca-certificates
        elif command -v dnf      >/dev/null 2>&1; then
            dnf install -y git ca-certificates
        elif command -v yum      >/dev/null 2>&1; then
            yum install -y git ca-certificates
        elif command -v zypper   >/dev/null 2>&1; then
            zypper --non-interactive install --no-recommends git ca-certificates
        elif command -v apk      >/dev/null 2>&1; then
            apk add --no-cache git ca-certificates
        else
            echo "no known package manager; cannot install git" >&2
            exit 1
        fi

    - name: Git checkout
      uses: actions/checkout@v4
      with:
        # libBrightLink lives at subprojects/libbrightlink/ as a git
        # submodule. The cross-compile lanes can't reach the network
        # later either, so we recursively clone here and trust the
        # ci/<distro>.sh dep script to add libsecp256k1-dev / libssl-dev
        # for the libBrightLink build inside the parent's meson run.
        submodules: recursive
        fetch-depth: 1

    - name: Fix permissions
      run: chown -Rv $(id -u):$(id -g) .

    - name: Install additional packages
      run: |
        export INSTALL=${{ matrix.container }}
        export DISTRO_VERSION="${INSTALL#*:}"
        INSTALL="${INSTALL#quay.io/centos/}"
        INSTALL="${INSTALL%%:*}"
        INSTALL="${INSTALL%%/*}"
        WITH_TEST_DEPS=1 ./ci/$INSTALL.sh
        if [ "$VARIANT" ]; then ./ci/$INSTALL.$VARIANT.sh; fi

    - name: Check dependencies
      run: ./build.sh dependencies

    - name: Check info
      run: ./build.sh info

    - name: Configure
      run: ./build.sh configure

    - name: Compile
      run: ./build.sh build

    - name: Show build log
      if: always()
      run: ./build.sh build-log

    - name: Check binaries
      run: ./build.sh check-binaries

    - name: Dist
      run: if [ ! "$SKIP_DISC" ]; then ./build.sh dist; else echo '::notice ::meson dist skipped'; fi

    - name: Install
      run: ./build.sh install

    - name: Show install log
      if: always()
      run: ./build.sh install-log

    - name: Tests
      run: if [ ! "$SKIP_TESTS" ]; then ./build.sh test; else echo '::notice ::Tests skipped'; fi

    - name: Show test log
      if: always()
      run: if [ ! "$SKIP_TESTS" ]; then ./build.sh test-log; else echo '::notice ::Tests skipped'; fi
